AWSTemplateFormatVersion: '2010-09-09'
Description: >
  remover cloud — distributed, ffmpeg-free video render on AWS Lambda. One container
  function renders a frame-range segment to S3; `remover cloud render` fans out N
  parallel invocations and concatenates the segments. The open, MIT equivalent of
  @remotion/lambda's deployed function + bucket. Plain CloudFormation (no SAM needed) —
  `remover cloud deploy` builds + pushes the image and deploys this stack.

Parameters:
  ImageUri:
    Type: String
    Description: ECR image URI for the worker (set by `remover cloud deploy`).
  MemorySize:
    Type: Number
    Default: 3008
    Description: MB per worker (more memory = more vCPU = faster per-slice capture).
  Timeout:
    Type: Number
    Default: 600
    Description: Max seconds per slice (10 min). Keep slices small enough to fit.
  EphemeralStorage:
    Type: Number
    Default: 4096
    Description: /tmp MB — holds one slice's frames + segment.

Resources:
  RenderBucket:
    Type: AWS::S3::Bucket
    Properties:
      LifecycleConfiguration:
        Rules:
          - Id: expire-segments
            Status: Enabled
            ExpirationInDays: 1

  WorkerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: render-bucket-rw
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [s3:PutObject, s3:GetObject]
                Resource: !Sub '${RenderBucket.Arn}/*'

  Worker:
    Type: AWS::Lambda::Function
    Properties:
      PackageType: Image
      # x86_64: Chrome-for-Testing has no arm64 chrome-headless-shell.
      Architectures: [x86_64]
      Code:
        ImageUri: !Ref ImageUri
      Role: !GetAtt WorkerRole.Arn
      MemorySize: !Ref MemorySize
      Timeout: !Ref Timeout
      EphemeralStorage:
        Size: !Ref EphemeralStorage

Outputs:
  FunctionName:
    Description: Pass to `remover cloud render --function`
    Value: !Ref Worker
  BucketName:
    Description: Pass to `remover cloud render --bucket`
    Value: !Ref RenderBucket
